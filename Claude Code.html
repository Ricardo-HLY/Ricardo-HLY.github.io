<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code介绍</title>
    <style type="text/css">
    h2{text-align: center;color: rgb(9, 153, 236);font: size 30px;;font-weight: bold;}
    .title{font-size: 22px;font-weight: bold;}
    .one{line-height: 1.8em;}
    #word{font-weight: bold;color: black;background-color: yellow;}
    ul {
    /* 移除默认列表样式 */
    list-style: none;
    padding-left: 0; /* 可选：调整整体缩进 */
}

ul li {
    /* 设置背景图片 */
    background-image: url(./image/th.webp);
    /* 关键：控制图片大小，例如宽高均为 16px */
    background-size: 16px 16px; 
    /* 确保图片不重复 */
    background-repeat: no-repeat;
    /* 调整文字位置，为图标留出空间 (left: 图标宽度 + 间距) */
    padding-left: 24px; 
    /* 调整图标垂直居中 */
    background-position: left center;
    /* 保持原有的行高 */
    line-height: 1.8em;
}
</style>
</head>
<body>
    <h2>Claude Code——智能AI编程助手</h2>
    <hr size="3" color="blue"/>
    <p class="title one">什么是Claude Code?</p>
    <p style="text-indent: 2em;" class="one">Claude Code是由Anthropic公司推出的<span id="word">AI编程助手</span>,可以帮助初学者快速写代码、查错误、学逻辑,非常适合新手学习。</p>
    <p class="title one">Claude Code 核心优势</p>
    <ul><li>支持HTML、CSS、JavaScript、Python等多种语言</li>
        <li>只能代码提示于自动修复</li>
        <li>代码逻辑详细讲解</li>
        <li>免费使用基础功能</li>
        <li>界面整洁,容易上手</li>
    </ul>
    <p style="text-indent: 2em;" class="one">如果你正在学习编程,<span id="word">Claude Code</span>会是你学习路上非常好的帮手,随时解答你的编程问题。</p>
</body>
</html>
