<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业展示页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            /* 全新秋日风景背景图 */
            background-image: url('https://images.unsplash.com/photo-1476820865390-c52aeebb9891?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=90');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .student-id {
            position: fixed;
            top: 20px;
            left: 30px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .homework-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.6);
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            min-width: 300px;
        }

        .homework-title {
            text-align: center;
            color: #ffd700;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .homework-list {
            list-style: none;
        }

        .homework-list li {
            margin: 18px 0;
            text-align: center;
        }

        .homework-list li a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
            padding: 8px 15px;
            display: inline-block;
        }

        .homework-list li a:hover {
            color: #ffd700;
            transform: scale(1.1);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="student-id">学号:25051030347</div>

    <div class="homework-container">
        <h2 class="homework-title">课程作业列表</h2>
        <ul class="homework-list">
            <li><a href="Claude Code.html" target="_blank">作业1. </a></li>
            <li><a href="作业2.html" target="_blank">作业2 </a></li>
            <li><a href="作业3.html" target="_blank">作业3 </a></li>
            <li><a href="作业4.html" target="_blank">作业4 </a></li>
            <li><a href="作业5.html" target="_blank">作业5 </a></li>
        </ul>
    </div>
</body>
</html>
